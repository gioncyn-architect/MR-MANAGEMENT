<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MR MASTER - ROYAL IVORY</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Montserrat',sans-serif;
background:radial-gradient(circle,#ffffff 0%,#f4f1ea 100%);
color:#444;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
overflow-x:hidden;
position:relative;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
pointer-events:none;
}

.luxury-frame{
position:relative;
z-index:1;
width:100%;
max-width:800px;
}

.main-wrapper{
width:100%;
background:rgba(255,255,255,0.7);
border-radius:25px;
padding:30px 15px;
backdrop-filter:blur(15px);
border:1px solid #d4af37;
box-shadow:0 15px 35px rgba(212,175,55,0.15);
}

header{text-align:center;padding-bottom:10px}

.logo-box{
display:flex;
justify-content:center;
align-items:center;
min-height:80px;
}

.char-typing{
font-size:60px;
font-weight:900;
color:#d4af37;
opacity:0;
display:inline-block;
}

.char-m{animation:type-char .3s forwards .2s}
.char-r{animation:type-char .3s forwards .7s}

@keyframes type-char{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.divider{
width:70%;
height:1px;
background:linear-gradient(to right,transparent,#d4af37,transparent);
margin:10px auto;
}

.typing-wrapper{
min-height:30px;
display:flex;
flex-direction:column;
align-items:center;
}

.agency-title{
font-weight:900;
font-size:1.4rem;
letter-spacing:2px;
text-transform:uppercase;
color:#333;
border-right:3px solid #d4af37;
opacity:0;
}

.shock-effect{animation:shock .4s}

@keyframes shock{
0%{transform:scale(1)}
20%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.agency-subtitle{
font-size:.65rem;
letter-spacing:3px;
color:#8a6d3b;
margin-top:5px;
font-weight:700;
}

.work-hours-box{
background:rgba(212,175,55,0.08);
border:1px dashed #d4af37;
border-radius:12px;
padding:10px;
margin:15px auto 0;
max-width:280px;
text-align:center;
}

.work-title{
font-size:.6rem;
font-weight:900;
color:#8a6d3b;
letter-spacing:1px;
text-transform:uppercase;
margin-bottom:4px;
display:block;
}

.work-time{
font-size:.85rem;
color:#000;
font-weight:900;
margin-bottom:4px;
display:block;
}

.slow-respon{
font-size:.55rem;
color:#d9534f;
font-weight:900;
letter-spacing:.5px;
animation:pulse-red 2s infinite;
}

@keyframes pulse-red{
0%{opacity:.6}
50%{opacity:1}
100%{opacity:.6}
}

.scroll-arrow{
width:15px;
height:15px;
border-right:2px solid #d4af37;
border-bottom:2px solid #d4af37;
transform:rotate(45deg);
margin:15px auto;
animation:bobbing 1.5s infinite;
}

@keyframes bobbing{
0%,100%{transform:translateY(0) rotate(45deg)}
50%{transform:translateY(8px) rotate(45deg)}
}

.accordion-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.accordion-item{
background:#fff;
border:1px solid rgba(212,175,55,.3);
border-radius:12px;
overflow:hidden;
}

.accordion-header{
width:100%;
background:none;
border:none;
padding:15px;
display:flex;
justify-content:space-between;
font-size:.7rem;
font-weight:900;
cursor:pointer;
}

.arrow{
width:6px;
height:6px;
border-right:2px solid #d4af37;
border-bottom:2px solid #d4af37;
transform:rotate(45deg);
transition:.3s;
}

.accordion-item.active .arrow{
transform:rotate(-135deg);
}

.accordion-content{
max-height:0;
overflow:hidden;
transition:.4s;
background:rgba(244,241,234,.4);
}

.accordion-item.active .accordion-content{
max-height:500px;
padding:15px;
}

.code-label{
font-size:.55rem;
font-weight:700;
color:#8a6d3b;
margin-bottom:8px;
display:block;
text-align:center;
}

.code-box{
background:#fff;
border-radius:8px;
padding:8px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #e0e0e0;
}

.code-display{
font-family:monospace;
font-size:.85rem;
font-weight:900;
}

.copy-btn{
background:#d4af37;
color:#fff;
border:none;
padding:5px 10px;
border-radius:4px;
cursor:pointer;
font-weight:900;
font-size:.55rem;
}

.app-link-btn{
display:block;
width:100%;
background:#333;
color:#fff;
text-decoration:none;
text-align:center;
padding:8px;
border-radius:6px;
font-weight:900;
font-size:.6rem;
margin-top:10px;
}

.wa-btn{
background:#128C7E!important;
}

footer{
text-align:center;
padding:40px 20px 20px;
}

.sig-line{
width:100%;
height:1px;
background:linear-gradient(to right,transparent,#d4af37,transparent);
margin-bottom:10px;
}

.sig-dev{
font-size:.55rem;
letter-spacing:4px;
color:#8a6d3b;
text-transform:uppercase;
margin-bottom:5px;
}

.sig-name{
font-family:'Playfair Display',serif;
font-style:italic;
font-size:1.2rem;
}

.sig-year{
font-size:.6rem;
color:#8a6d3b;
margin-top:8px;
font-weight:900;
letter-spacing:2px;
}
</style>

</head>

<body>

<div id="particles-js"></div>

<div class="luxury-frame">
<div class="main-wrapper">

<header>

<div class="logo-box">
<span class="char-typing char-m">M</span>
<span class="char-typing char-r">R</span>
</div>

<div class="divider"></div>

<div class="typing-wrapper">
<h1 class="agency-title" id="shock-text"></h1>
<div class="agency-subtitle">MASTER AGENCY INDONESIA</div>
</div>

<div class="work-hours-box">
<span class="work-title">Jam Kerja Senin-Jum'at</span>
<span class="work-time">08:00 - 17:00 WIB</span>
<span class="slow-respon">SLOW RESPON SAMPAI WAKTU TIDAK DITENTUKAN!!</span>
</div>

</header>

<div class="scroll-arrow"></div>

<div class="accordion-grid" id="grid2"></div>

<footer>
<div class="sig-line"></div>
<div class="sig-dev">Architected By</div>
<div class="sig-name">Vivi Gioncyn</div>
<div class="sig-year">© MMXXVI</div>
</footer>

</div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{
particles:{
number:{value:45},
color:{value:"#d4af37"},
shape:{type:"circle"},
opacity:{value:.5,random:true},
size:{value:2,random:true},
move:{enable:true,speed:1,direction:"top",out_mode:"out"}
}
});

const textEl=document.getElementById("shock-text");
const phrase="Master Management";
let charIndex=0;

function handleTypingOnce(){

if(charIndex<phrase.length){

textEl.innerText=phrase.substring(0,charIndex+1);
charIndex++;

setTimeout(handleTypingOnce,150);

}else{

textEl.classList.add("shock-effect");
textEl.style.borderRight="none";

}

}

setTimeout(()=>{
textEl.style.opacity=1;
handleTypingOnce();
},1500);

const grid=document.getElementById("grid2");

apps.forEach((app,i)=>{

if(app==="HUBUNGI AGENCY"){

}else{

let downloadBtn=
links[app]?
`<a href="${links[app]}" target="_blank" class="app-link-btn">UNDUH</a>`
:"";

<div class="code-box">

</div>

${app}

</button>

<div class="accordion-content">
${content}
</div>

</div>

`;

function toggleAcc(el){

const parent=el.parentElement;

document.querySelectorAll(".accordion-item")

.forEach(item=>{
if(item!==parent)
item.classList.remove("active")
});

parent.classList.toggle("active");

}


function copyIt(id,btn){

const txt=document.getElementById(id).innerText;

navigator.clipboard.writeText(txt)

.then(()=>{

btn.innerText="OK";

setTimeout(()=>btn.innerText="SALIN",1000);

});

}

</script>

</body>
</html>
